# This folder is self-contained community code. It depends on the published
# @a2ui/* packages from the public npm registry (not the monorepo workspace),
# so the @a2ui scope is pinned here to the public registry to override any
# private registry configured by a parent .yarnrc.yml.
nodeLinker: node-modules

npmScopes:
  a2ui:
    npmRegistryServer: "https://registry.npmjs.org"
